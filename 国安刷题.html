  {id:115,t:"multi",q:"（ ）和（ ）都是社会主义市场经济的重要组成部分。",o:{A:"公有制经济",B:"非公有制经济",C:"资本主义经济",D:"民营经济"},a:"AB"},
  {id:116,t:"multi",q:"否定我国基本经济制度的错误观点包括（ ）。",o:{A:"资本主义社会",B:"国家资本主义",C:"新官僚资本主义",D:"封建主义"},a:"ABC"},
  {id:117,t:"multi",q:"中国共产党领导实现了社会治理方式的历史性转变，创造了并不断续写着（ ）和（ ）的两大奇迹。",o:{A:"经济快速发展",B:"社会长期稳定",C:"文化繁荣昌盛",D:"生态环境改善"},a:"AB"},
  {id:118,t:"multi",q:"哲学社会科学发展水平反映了一个民族的（ ），体现了一个国家的综合国力。",o:{A:"思维能力",B:"精神品格",C:"文明素质",D:"经济实力"},a:"ABC"},
  {id:119,t:"multi",q:"建设（ ）的社会治理共同体。",o:{A:"人人有责",B:"人人尽责",C:"人人享有",D:"人人维护"},a:"ABC"},
  {id:120,t:"multi",q:"经济全球化促进了（ ），推动了世界经济快速发展。",o:{A:"贸易繁荣",B:"投资便利",C:"人员流动",D:"技术发展"},a:"ABCD"},
  {id:121,t:"multi",q:"各国应认识到国际安全机制构建和完善的目的是实现（ ）。",o:{A:"共同安全",B:"综合安全",C:"合作安全",D:"可持续安全"},a:"ABCD"}
];

// ========== DOM REFS ==========
var $ = function(id){ return document.getElementById(id); };
var tagEl = $('qTag'), numEl = $('qNum'), txtEl = $('qText'), optsEl = $('opts');
var resEl = $('resBanner'), btnSubmit = $('btnSubmit'), btnSkip = $('btnSkip');
var btnShow = $('btnShow'), btnNext = $('btnNext');
var accEl = $('acc'), doneEl = $('done'), remainEl = $('remain'), progEl = $('prog');
var wcBadge = $('wcBadge'), wrongList = $('wrongList');
var stOk = $('stOk'), stBad = $('stBad'), stSkip = $('stSkip'), stRate = $('stRate');

// ========== STATE ==========
var STORAGE_KEY = 'gs_quiz_v2';
var pool = [], idx = 0, answered = false, selected = {};
var done = {}, wrongSet = {}, skipped = 0;
var settings = {range:'all',random:true,removeCorrect:true,limit:0};

function loadState(){
  try{
    var s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(s){ done=s.done||{}; wrongSet=s.wrongSet||{}; skipped=s.skipped||0; if(s.settings) settings=s.settings; }
  }catch(e){}
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({done:done,wrongSet:wrongSet,skipped:skipped,settings:settings}));
}
function getStats(){
  var c=0,w=0;
  for(var k in done){ if(done[k]==='ok')c++; else if(done[k]==='bad')w++; }
  return {ok:c,bad:w,skipped:skipped,total:c+w,rate:c+w>0?Math.round(c/(c+w)*100):0};
}

// ========== POOL ==========
function buildPool(){
  var ids;
  if(settings.range==='single') ids=Q.filter(function(q){return q.t==='single'}).map(function(q){return q.id;});
  else if(settings.range==='multi') ids=Q.filter(function(q){return q.t==='multi'}).map(function(q){return q.id;});
  else if(settings.range==='wrong'){ ids=[]; for(var k in wrongSet) ids.push(parseInt(k)); }
  else ids=Q.map(function(q){return q.id;});

  if(settings.removeCorrect){
    ids=ids.filter(function(id){return done[id]!=='ok';});
  }

  if(settings.random){
    for(var i=ids.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=ids[i];ids[i]=ids[j];ids[j]=t;}
  }

  if(settings.limit>0) ids=ids.slice(0,settings.limit);

  pool=ids; idx=0;
}

function curQ(){
  if(idx>=pool.length) return null;
  return Q.filter(function(q){return q.id===pool[idx];})[0];
}

// ========== RENDER ==========
function render(){
  var q=curQ();
  if(!q){
    $('qCard').innerHTML='<div class="empty"><div class="emj">🏆</div>本轮题目已全部完成！<br><span style="font-size:12px">去看看错题回顾吧</span></div>';
    $('btnRow').style.display='none';
    btnShow.style.display='none'; btnNext.style.display='none';
    updateUI(); return;
  }

  answered=false; selected={};
  $('btnRow').style.display=''; btnShow.style.display=''; btnNext.style.display='';
  btnSubmit.textContent='✓ 提交答案'; btnSubmit.disabled=false;

  tagEl.textContent=q.t==='single'?'单选题':'多选题';
  tagEl.className='q-tag '+(q.t==='single'?'sin':'mul');
  numEl.textContent='第 '+(idx+1)+'/'+pool.length+' 题 · 编号 #'+q.id;
  txtEl.textContent=q.q;

  optsEl.innerHTML='';
  var letters=Object.keys(q.o);
  for(var i=0;i<letters.length;i++){
    var lt=letters[i], tx=q.o[lt];
    var div=document.createElement('div');
    div.className='opt';
    div.innerHTML='<span class="let">'+lt+'</span><span class="txt">'+tx+'</span><span class="icn"></span>';
    div.setAttribute('data-letter',lt);
    div.onclick=function(e){ var el=e.currentTarget; toggleOpt(el.getAttribute('data-letter'),el); };
    optsEl.appendChild(div);
  }

  resEl.className='res'; resEl.textContent='';
  updateUI();
}

function toggleOpt(letter,el){
  if(answered) return;
  var q=curQ(); if(!q) return;

  if(q.t==='single'){
    selected={};
    var all=optsEl.querySelectorAll('.opt');
    for(var i=0;i<all.length;i++) all[i].classList.remove('sel');
    selected[letter]=true;
    el.classList.add('sel');
  }else{
    if(selected[letter]){ delete selected[letter]; el.classList.remove('sel'); }
    else{ selected[letter]=true; el.classList.add('sel'); }
  }
}

// ========== ACTIONS ==========
function submit(){
  var q=curQ(); if(!q||answered) return;
  var keys=Object.keys(selected);
  if(keys.length===0) return;

  answered=true;
  var picked=keys.sort().join('');
  var ok=(picked===q.a);
  done[q.id]=ok?'ok':'bad';
  if(ok) delete wrongSet[q.id]; else wrongSet[q.id]=true;
  saveState();

  // Highlight
  var all=optsEl.querySelectorAll('.opt');
  for(var i=0;i<all.length;i++){
    var el=all[i], lt=el.getAttribute('data-letter');
    if(q.a.indexOf(lt)>=0){ el.classList.add('ok'); el.querySelector('.icn').textContent='✓'; }
    if(selected[lt] && q.a.indexOf(lt)<0){ el.classList.add('bad'); el.querySelector('.icn').textContent='✗'; }
  }

  resEl.className='res show '+(ok?'ok':'bad');
  if(ok) resEl.textContent='✅ 回答正确！';
  else {
    var ansText = q.a.split('').map(function(l){return l+'.'+q.o[l];}).join('  ');
    resEl.textContent='❌ 错误！正确答案：'+q.a+' ('+ansText+')';
  }
  btnSubmit.textContent='已提交'; btnSubmit.disabled=true;
  updateUI();
}

function showAns(){
  var q=curQ(); if(!q) return;
  answered=true; done[q.id]='skip'; skipped++; saveState();
  var all=optsEl.querySelectorAll('.opt');
  for(var i=0;i<all.length;i++){
    var el=all[i], lt=el.getAttribute('data-letter');
    if(q.a.indexOf(lt)>=0){ el.classList.add('ok'); el.querySelector('.icn').textContent='✓'; }
  }
  resEl.className='res show ok';
  resEl.textContent='💡 正确答案：'+q.a;
  btnSubmit.disabled=true;
  updateUI();
}

function skip(){
  var q=curQ();
  if(q&&!answered){ done[q.id]='skip'; skipped++; saveState(); }
  nextQ();
}

function nextQ(){
  idx++;
  if(idx>=pool.length){ buildPool(); if(pool.length===0){ pool=Q.map(function(q){return q.id;}); idx=0; } }
  render();
}

// ========== UI ==========
function updateUI(){
  var s=getStats();
  accEl.textContent=s.rate+'%';
  doneEl.textContent=s.total;
  remainEl.textContent=Math.max(0,pool.length-idx-(answered?1:0));
  var pct=pool.length>0?Math.min(100,Math.round((idx+(answered?1:0))/pool.length*100)):0;
  progEl.style.width=pct+'%';

  var wc=0; for(var k in wrongSet) wc++;
  wcBadge.textContent=wc;
  wcBadge.style.display=wc>0?'inline':'none';

  stOk.textContent=s.ok; stBad.textContent=s.bad;
  stSkip.textContent=s.skipped; stRate.textContent=s.rate+'%';
}

function renderWrong(){
  var wc=0, html='';
  for(var k in wrongSet){
    wc++;
    var q=Q.filter(function(q){return q.id===parseInt(k);})[0];
    if(!q) continue;
    var ansText = q.a.split('').map(function(l){return l+'.'+q.o[l];}).join('；');
    html+='<div class="wrong-item"><div class="qt">#'+q.id+' ['+(q.t==='single'?'单选':'多选')+'] '+q.q+'</div><div class="ac">✅ 正确答案：'+q.a+'（'+ansText+'）</div></div>';
  }
  wrongList.innerHTML=html||'<div class="empty"><div class="emj">🎉</div>暂无错题，继续加油！</div>';
  wcBadge.textContent=wc;
  wcBadge.style.display=wc>0?'inline':'none';
}

function clearWrong(){
  wrongSet={}; saveState(); renderWrong(); updateUI();
}

// ========== SETTINGS ==========
function applySettings(){
  settings.range=$('setRange').value;
  settings.limit=parseInt($('setLimit').value)||0;
  saveState(); buildPool(); render(); updateUI();
}
function toggleSet(key){
  if(key==='random'){ settings.random=!settings.random; $('tglRandom').classList.toggle('on',settings.random); }
  if(key==='remove'){ settings.removeCorrect=!settings.removeCorrect; $('tglRemove').classList.toggle('on',settings.removeCorrect); }
  saveState(); buildPool(); render(); updateUI();
}
function syncSettingsUI(){
  $('setRange').value=settings.range;
  $('setLimit').value=settings.limit;
  $('tglRandom').classList.toggle('on',settings.random);
  $('tglRemove').classList.toggle('on',settings.removeCorrect);
}

// ========== TABS ==========
function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(name==='quiz') $('tabQuiz').classList.add('active');
  if(name==='review') $('tabReview').classList.add('active');
  if(name==='settings') $('tabSettings').classList.add('active');

  $('pageQuiz').style.display=name==='quiz'?'':'none';
  $('pageReview').style.display=name==='review'?'':'none';
  $('pageSettings').style.display=name==='settings'?'':'none';

  if(name==='review') renderWrong();
  if(name==='settings'){ syncSettingsUI(); updateUI(); }
}

// ========== EVENTS ==========
$('tabQuiz').addEventListener('click',function(){switchTab('quiz');});
$('tabReview').addEventListener('click',function(){switchTab('review');});
$('tabSettings').addEventListener('click',function(){switchTab('settings');});

$('tglRandom').addEventListener('click',function(){toggleSet('random');});
$('tglRemove').addEventListener('click',function(){toggleSet('remove');});
$('setRange').addEventListener('change',applySettings);
$('setLimit').addEventListener('change',applySettings);
$('btnClearWrong').addEventListener('click',clearWrong);

btnSubmit.addEventListener('click',submit);
btnSkip.addEventListener('click',skip);
btnShow.addEventListener('click',showAns);
btnNext.addEventListener('click',nextQ);

// Keyboard
document.addEventListener('keydown',function(e){
  if(answered) return;
  var q=curQ(); if(!q) return;
  var key=e.key.toUpperCase();
  if(q.o[key]){
    var all=optsEl.querySelectorAll('.opt');
    var letters=Object.keys(q.o);
    var ii=letters.indexOf(key);
    if(ii>=0&&ii<all.length) toggleOpt(key,all[ii]);
  }
  if(e.key==='Enter'){ e.preventDefault(); submit(); }
  if(e.key==='ArrowRight') nextQ();
});

// ========== INIT ==========
loadState();
syncSettingsUI();
buildPool();
render();
updateUI();
})();
</script>
</body>
